<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="190" fill="#2563eb" opacity="0.1"/>

  <!-- 幻灯片层叠效果 -->
  <rect x="80" y="140" width="240" height="160" rx="8" fill="#e0f2fe" stroke="#3b82f6" stroke-width="3"/>
  <rect x="90" y="130" width="240" height="160" rx="8" fill="#bfdbfe" stroke="#3b82f6" stroke-width="3"/>
  <rect x="100" y="120" width="240" height="160" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>

  <!-- HTML标签 -->
  <text x="200" y="180" font-family="monospace" font-size="48" font-weight="bold" fill="#2563eb" text-anchor="middle">&lt;HTML&gt;</text>
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="24" fill="#1e40af" text-anchor="middle">Slides</text>

  <!-- AI元素 - 神经网络节点 -->
  <g opacity="0.8">
    <!-- 左侧节点 -->
    <circle cx="120" cy="240" r="8" fill="#10b981"/>
    <circle cx="120" cy="260" r="8" fill="#10b981"/>

    <!-- 中间节点 -->
    <circle cx="170" cy="235" r="8" fill="#3b82f6"/>
    <circle cx="170" cy="255" r="8" fill="#3b82f6"/>
    <circle cx="170" cy="265" r="8" fill="#3b82f6"/>

    <!-- 右侧节点 -->
    <circle cx="220" cy="240" r="8" fill="#8b5cf6"/>
    <circle cx="220" cy="260" r="8" fill="#8b5cf6"/>

    <!-- 连接线 -->
    <line x1="120" y1="240" x2="170" y2="235" stroke="#94a3b8" stroke-width="2"/>
    <line x1="120" y1="240" x2="170" y2="255" stroke="#94a3b8" stroke-width="2"/>
    <line x1="120" y1="260" x2="170" y2="255" stroke="#94a3b8" stroke-width="2"/>
    <line x1="120" y1="260" x2="170" y2="265" stroke="#94a3b8" stroke-width="2"/>

    <line x1="170" y1="235" x2="220" y2="240" stroke="#94a3b8" stroke-width="2"/>
    <line x1="170" y1="255" x2="220" y2="240" stroke="#94a3b8" stroke-width="2"/>
    <line x1="170" y1="255" x2="220" y2="260" stroke="#94a3b8" stroke-width="2"/>
    <line x1="170" y1="265" x2="220" y2="260" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- AI标识 -->
  <text x="320" y="150" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#10b981">AI</text>
  <circle cx="335" cy="140" r="3" fill="#10b981"/>
  <circle cx="345" cy="135" r="2" fill="#10b981"/>
  <circle cx="325" cy="135" r="2" fill="#10b981"/>
</svg>
